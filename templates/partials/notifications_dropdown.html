<div class="bg-white shadow-lg rounded-lg w-80 max-h-96 overflow-y-auto border">

  <div class="p-3 border-b font-semibold bg-gray-50 flex justify-between items-center">
    <span>Notifications</span>
    <a href="{% url 'notifications_center' %}" class="text-xs text-blue-600 hover:underline">View All</a>
  </div>

  {% if notifications %}
  <ul>
    {% for n in notifications %}
    <li class="border-b last:border-0">
      <a href="{% url 'mark_notification_read' n.id %}"
        class="block p-3 transition hover:bg-gray-100 {% if not n.is_read %}bg-blue-50/50 font-semibold{% endif %}">

        <div class="flex justify-between items-start">
          <div class="text-sm text-gray-800">
            {{ n.title }}
            {% if not n.is_read %}
            <span class="inline-block w-2 h-2 bg-red-500 rounded-full ml-1"></span>
            {% endif %}
          </div>
          <div class="text-[10px] text-gray-500 whitespace-nowrap ml-2">
            {{ n.created_at|timesince }} ago
          </div>
        </div>

        <div class="text-xs text-gray-500 mt-1 line-clamp-2">
          {{ n.content|truncatechars:100 }}
        </div>
      </a>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <div class="p-8 text-center text-sm text-gray-500">
    <div class="text-2xl mb-2">🔔</div>
    No new notifications
  </div>
  {% endif %}

</div>
