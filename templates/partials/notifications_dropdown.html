<div class="bg-[#0d0d0d] border border-[#262626] rounded-lg w-80 max-h-96 overflow-hidden flex flex-col shadow-2xl">

  <div class="p-4 border-b border-[#262626] bg-[#161616] flex justify-between items-center">
    <span class="text-[10px] font-bold text-[#525252] uppercase tracking-widest">Signal Intercepts</span>
    <a href="{% url 'notifications_center' %}"
      class="text-[9px] font-bold text-[#0f62fe] hover:underline uppercase tracking-widest">Archive Trace</a>
  </div>

  <div class="overflow-y-auto flex-1">
    {% if notifications %}
    <ul class="divide-y divide-[#262626]">
      {% for n in notifications %}
      <li class="relative">
        <a href="{% url 'mark_notification_read' n.id %}"
          class="block p-4 transition hover:bg-[#161616] {% if not n.is_read %}bg-[#0f62fe]/[0.05]{% endif %}">

          <div class="flex justify-between items-start mb-1">
            <div class="text-[11px] font-bold {% if not n.is_read %}text-[#f4f4f4]{% else %}text-[#525252]{% endif %}">
              {% if not n.is_read %}
              <span class="inline-block w-1.5 h-1.5 bg-[#0f62fe] rounded-full mr-1.5"></span>
              {% endif %}
              {{ n.title }}
            </div>
            <div class="text-[9px] text-[#525252] whitespace-nowrap ml-2 uppercase font-mono">
              {{ n.created_at|timesince }}
            </div>
          </div>

          <div
            class="text-[10px] {% if not n.is_read %}text-[#a8a8a8]{% else %}text-[#525252]{% endif %} leading-relaxed line-clamp-2">
            {{ n.content|truncatechars:100 }}
          </div>
        </a>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <div class="p-10 text-center flex flex-col items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-[#161616] flex items-center justify-center text-[#525252]">
        🔔
      </div>
      <p class="text-[10px] font-bold uppercase tracking-widest text-[#525252]">Monitoring Sectors Clear</p>
    </div>
    {% endif %}
  </div>

</div>
