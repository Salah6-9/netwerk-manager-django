<div class="grid grid-cols-4 gap-4">

    <div class="bg-white shadow rounded p-4">
        <p class="text-sm text-gray-500">Total Devices</p>
        <p class="text-2xl font-bold text-gray-800">{{ total_devices }}</p>
    </div>

    <div class="bg-white shadow rounded p-4">
        <p class="text-sm text-gray-500">Online</p>
        <p class="text-2xl font-bold text-green-600">{{ online_devices }}</p>
    </div>

    <div class="bg-white shadow rounded p-4">
        <p class="text-sm text-gray-500">Offline</p>
        <p class="text-2xl font-bold text-red-500">{{ offline_devices }}</p>
    </div>

    <div class="bg-white shadow rounded p-4">
        <p class="text-sm text-gray-500">Active Alerts</p>
        <p class="text-2xl font-bold text-yellow-500">{{ active_alerts }}</p>
    </div>

</div>
