<!-- Sidebar -->
<aside class="w-64 bg-slate-900 text-slate-300 min-h-screen flex flex-col shadow-xl">

    <!-- Header/Logo -->
    <div class="p-6 border-b border-slate-800">
        <div class="flex items-center gap-3">
            <svg style="width:32px;height:32px;" class="text-blue-600" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
            <h2 class="text-xl font-bold text-white tracking-tight">
                Network
            </h2>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 p-4 space-y-1">

        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider px-2 py-2">
            Main Menu
        </p>

        <a href="/dashboard/"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 hover:bg-slate-800 hover:text-white {% if request.path == '/dashboard/' %}bg-slate-800 text-white font-medium{% endif %}">
            <span class="text-lg">📊</span>
            Dashboard
        </a>

        {% if request.user.is_staff %}
        <a href="/devices/"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 hover:bg-slate-800 hover:text-white {% if '/devices/' in request.path %}bg-slate-800 text-white font-medium{% endif %}">
            <span class="text-lg">🖥️</span>
            Devices
        </a>

        <a href="/enrollments/"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 hover:bg-slate-800 hover:text-white {% if '/enrollments/' in request.path %}bg-slate-800 text-white font-medium{% endif %}">
            <span class="text-lg">🔒</span>
            Enrollments
        </a>
        {% else %}
        <a href="/setup-agent/"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 hover:bg-slate-800 hover:text-white {% if '/setup-agent/' in request.path %}bg-slate-800 text-white font-medium{% endif %}">
            <span class="text-lg">⚙️</span>
            Setup Agent
        </a>
        {% endif %}

        <div class="pt-4">
            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider px-2 py-2">
                Operations
            </p>

            <a href="{% url 'tickets_list' %}"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 hover:bg-slate-800 hover:text-white {% if '/support/' in request.path %}bg-slate-800 text-white font-medium{% endif %}">
                <span class="text-lg">🎫</span>
                Support Tickets
            </a>

            <a href="/notifications/"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 hover:bg-slate-800 hover:text-white {% if '/notifications/' in request.path %}bg-slate-800 text-white font-medium{% endif %}">
                <span class="text-lg">🔔</span>
                Notifications
            </a>
        </div>

        {% if request.user.is_staff %}
        <div class="pt-4 border-t border-slate-800 mt-4">
            <a href="/admin/"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 hover:bg-slate-800 hover:text-white">
                <span class="text-lg">🛡️</span>
                Admin Panel
            </a>
        </div>
        {% endif %}

    </nav>

</aside>
