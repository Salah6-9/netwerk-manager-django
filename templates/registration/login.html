{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Network Manager</title>

    <!-- Google Fonts: Inter & JetBrains Mono for tech feel -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Tailwind CSS (via output.css or CDN for safety if build is missing) -->
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .tech-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Glassmorphism Background Pattern */
        .bg-grid {
            background-size: 40px 40px;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }

        .glow-cyan {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }

        .glow-pulse {
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.7;
            }
        }

        /* Custom scrollbar for tech feel */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>

<body
    class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-4 selection:bg-cyan-500/30 overflow-hidden relative">

    <!-- Animated Network Circles (Background) -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div
            class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-cyan-500/10 rounded-full blur-[120px] glow-pulse">
        </div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px] glow-pulse"
            style="animation-delay: 1s;"></div>
        <div class="absolute inset-0 bg-grid opacity-20"></div>
    </div>

    <!-- Login Container -->
    <div class="w-full max-w-md relative z-10" x-data="{ showPassword: false, loading: false }"
        x-init="$nextTick(() => { $refs.username.focus() })">

        <!-- Logo / Branding -->
        <div class="text-center mb-8">

            <h1 class="text-3xl font-bold tracking-tight text-white mb-2">Network Manager</h1>
            <p class="text-slate-400 text-sm tech-mono">SYSTEM MONITORING AUTHENTICATION</p>
        </div>

        <!-- Login Card -->
        <div
            class="backdrop-blur-xl bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl overflow-hidden relative">

            <!-- Error Message -->
            {% if form.errors %}
            <div class="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl flex items-center gap-3 text-red-400 text-sm animate-bounce"
                x-data="{ show: true }" x-show="show">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <span>اسم المستخدم أو كلمة المرور غير صحيحة.</span>
            </div>
            {% endif %}

            <form method="post" class="space-y-6" @submit="loading = true">
                {% csrf_token %}

                <!-- Username -->
                <div class="space-y-2">
                    <label for="id_username"
                        class="text-xs font-medium text-slate-400 tech-mono uppercase tracking-widest px-1">Username</label>
                    <div class="relative group">
                        <span
                            class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-500 group-focus-within:text-cyan-400 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </span>
                        <input type="text" name="username" id="id_username" required x-ref="username"
                            class="w-full bg-slate-900/50 border border-white/5 rounded-2xl py-4 pr-12 pl-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500/50 transition-all duration-300"
                            placeholder="أدخل اسم المستخدم">
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center px-1">
                        <label for="id_password"
                            class="text-xs font-medium text-slate-400 tech-mono uppercase tracking-widest">Password</label>
                        <a href="#" class="text-xs text-cyan-400 hover:text-cyan-300 transition-colors">Forgot?</a>
                    </div>
                    <div class="relative group">
                        <span
                            class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-500 group-focus-within:text-cyan-400 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </span>
                        <input :type="showPassword ? 'text' : 'password'" name="password" id="id_password" required
                            class="w-full bg-slate-900/50 border border-white/5 rounded-2xl py-4 pr-12 pl-12 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500/50 transition-all duration-300"
                            placeholder="••••••••">
                        <button type="button" @click="showPassword = !showPassword"
                            class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 hover:text-white transition-colors">
                            <svg x-show="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg x-show="showPassword" x-cloak class="w-5 h-5" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.046m4.596-4.596A10.05 10.05 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.017 10.017 0 01-1.39 3.018m-5.117-5.117L15 13M9 9l1.414 1.414m-3.414 3.414L3 18m18-2l-2-2m-2-2l-2-2" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="w-full bg-gradient-to-tr from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-4 rounded-2xl shadow-lg transform active:scale-95 transition-all duration-200 flex items-center justify-center gap-2 group relative overflow-hidden"
                    :disabled="loading">
                    <span x-show="!loading" class="relative z-10">دخول النظام</span>
                    <span x-show="loading" x-cloak class="relative z-10">
                        <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                    </span>
                    <div
                        class="absolute inset-0 bg-white/20 translate-y-20 group-hover:translate-y-0 transition-transform duration-300">
                    </div>
                </button>

                <!-- Footer Links -->
                <p class="text-center text-slate-500 text-xs mt-6 tech-mono tracking-tighter">
                    ENCRYPTED SESSION • AES-256
                </p>
            </form>
        </div>

        <!-- Social/Support -->

    </div>

</body>

</html>
