{% extends "base.html" %}

{% block content %}

<div style="max-width:800px;margin:auto;display:flex;flex-direction:column;gap:14px;">

    <!-- HEADER -->
    <div style="border-bottom:1px solid var(--border-dim);padding-bottom:10px;">
        <div style="font-size:13px;font-weight:700;color:var(--text-1);text-transform:uppercase;letter-spacing:0.08em;">
            Create Support Ticket
        </div>
        <div style="font-size:10px;color:var(--text-3);">
            Report an issue or request support
        </div>
    </div>

    <form method="post" class="panel">
        {% csrf_token %}
        <input type="hidden" id="device-id" value="{{ device.id|default:'' }}">

        <!-- TARGET (ADMIN ONLY) -->
        {% if request.user.is_staff %}
        <div class="panel-hd">
            <span class="ph-label">Target</span>
        </div>

        <div style="padding:12px;display:flex;flex-direction:column;gap:10px;">

            <div>
                <label class="kv-k">Target Type</label>
                <select id="target_type" name="target_type" class="input">
                    <option value="user" selected>Specific User</option>
                    <option value="office">Entire Office</option>
                    <option value="department">Entire Department</option>
                </select>
            </div>

            <div id="div_department">
                <label class="kv-k">Department</label>
                <select id="department" name="department" class="input">
                    <option value="">Select Department</option>
                    {% for d in departments %}
                    <option value="{{ d.id }}">{{ d.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div id="div_office">
                <label class="kv-k">Office</label>
                <select id="office" name="office" class="input">
                    <option value="">Select Office</option>
                </select>
            </div>

            <div id="div_user">
                <label class="kv-k">User</label>
                <select id="user" name="user" class="input">
                    <option value="">Select User</option>
                </select>
            </div>

            {% if device %}
            <div style="background:var(--bg-soft);padding:8px;border:1px solid var(--border-dim);border-radius:4px;">
                <strong>Device:</strong>
                {{ device.hostname }} ({{ device.mac }})
                <input type="hidden" name="device" value="{{ device.id }}">
            </div>
            {% endif %}

        </div>
        {% endif %}

        <!-- CONTENT -->
        <div class="panel-hd">
            <span class="ph-label">Ticket Details</span>
        </div>

        <div style="padding:12px;display:flex;flex-direction:column;gap:10px;">

            <div>
                <label class="kv-k">Title</label>
                <input type="text" name="title" required class="input">
            </div>

            <div>
                <label class="kv-k">Description</label>
                <textarea name="description" rows="5" class="input"></textarea>
            </div>

        </div>

        <!-- ACTION -->
        <div style="padding:12px;border-top:1px solid var(--border-dim);display:flex;justify-content:flex-end;">
            <button type="submit" class="scan-btn sb-on">
                Create Ticket
            </button>
        </div>

    </form>

</div>

<!-- SIMPLE INPUT STYLE -->
<style>
.input {
    width:100%;
    padding:6px 8px;
    border:1px solid var(--border-dim);
    background:var(--bg-soft);
    border-radius:4px;
    font-size:11px;
    color:var(--text-1);
}
.input:focus {
    outline:none;
    border-color:var(--accent);
}
</style>

<script>

const deviceId = document.getElementById("device-id").value;
const targetTypeSelect = document.getElementById("target_type");
const divOffice = document.getElementById("div_office");
const divUser = document.getElementById("div_user");
const officeSelect = document.getElementById("office");
const userSelect = document.getElementById("user");
const deptSelect = document.getElementById("department");

function updateVisibility() {
    if (!targetTypeSelect) return;

    const type = targetTypeSelect.value;

    divOffice.style.display = (type !== "department") ? "block" : "none";
    divUser.style.display = (type === "user") ? "block" : "none";

    officeSelect.required = (type !== "department");
    userSelect.required = (type === "user");
    deptSelect.required = true;
}

if (targetTypeSelect) {
    targetTypeSelect.addEventListener("change", updateVisibility);
    updateVisibility();
}

if (!deviceId && deptSelect) {

    deptSelect.addEventListener("change", function () {
        let id = this.value;
        if (!id) return;

        fetch(`/support/api/offices/${id}/`)
            .then(r => r.json())
            .then(data => {
                officeSelect.innerHTML = "<option value=''>Select Office</option>";
                userSelect.innerHTML = "<option value=''>Select User</option>";

                data.forEach(o => {
                    officeSelect.innerHTML += `<option value="${o.id}">${o.name}</option>`;
                });
            });
    });

    officeSelect.addEventListener("change", function () {
        let id = this.value;
        if (!id) return;

        fetch(`/support/api/users/${id}/`)
            .then(r => r.json())
            .then(data => {
                userSelect.innerHTML = "<option value=''>Select User</option>";

                data.forEach(u => {
                    userSelect.innerHTML += `<option value="${u.id}">${u.username}</option>`;
                });
            });
    });
}

</script>

{% endblock %}
